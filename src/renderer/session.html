<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Code de Session — SafeExam</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <!-- Styles -->
    <link rel="stylesheet" href="./assets/css/theme.css" />
    <link rel="stylesheet" href="./assets/css/components.css" />
    <link rel="stylesheet" href="./assets/css/animation_man_boxes.css" />
    <link rel="stylesheet" href="./assets/css/session.css" />
    <!-- Config globale -->
    <script src="./config.js"></script>
</head>

<body>
    <div class="bg">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>
    <div class="grid-overlay"></div>

    <div class="container">


        <div class="card">
            <!-- New Man Between Boxes Animation -->
            <div class="animation-container state-student">
                <div class="box box-left">
                    <div class="box-fill"></div>
                </div>
                <div class="pulse-line pulse-left"></div>
                <div class="man">
                    <div class="man-head"></div>
                    <div class="man-body"></div>
                </div>
                <div class="pulse-line pulse-right"></div>
                <div class="box box-right">
                    <div class="box-fill"></div>
                </div>
            </div>

            <div class="card-title">Code de session</div>
            <div class="card-sub">Entrez le code à 6 chiffres que<br />votre professeur vous a communiqué.</div>

            <div id="errorMsg" class="error-msg"></div>

            <div class="code-inputs" id="codeInputs">
                <input class="code-digit" maxlength="1" type="text" inputmode="numeric" pattern="[0-9]">
                <input class="code-digit" maxlength="1" type="text" inputmode="numeric" pattern="[0-9]">
                <input class="code-digit" maxlength="1" type="text" inputmode="numeric" pattern="[0-9]">
                <span class="code-separator">–</span>
                <input class="code-digit" maxlength="1" type="text" inputmode="numeric" pattern="[0-9]">
                <input class="code-digit" maxlength="1" type="text" inputmode="numeric" pattern="[0-9]">
                <input class="code-digit" maxlength="1" type="text" inputmode="numeric" pattern="[0-9]">
            </div>

            <button id="joinBtn" class="btn btn-primary" disabled>
                Rejoindre la session →
            </button>
        </div>

        <div class="back-link" onclick="window.location.href='./login.html'">
            ← Revenir à <span>la connexion</span>
        </div>
    </div>

    <script src="./viewmodels/SessionVM.js"></script>
    <script>
        const digits = document.querySelectorAll('.code-digit');
        const joinBtn = document.getElementById('joinBtn');
        const errorEl = document.getElementById('errorMsg');

        // Auto-advance, auto-backspace
        digits.forEach((input, i) => {
            input.addEventListener('keydown', e => {
                if (e.key === 'Backspace' && !input.value && i > 0) {
                    digits[i - 1].focus();
                }
            });
            input.addEventListener('input', () => {
                input.value = input.value.replace(/[^0-9]/g, '').slice(0, 1);
                input.classList.toggle('filled', !!input.value);
                if (input.value && i < digits.length - 1) digits[i + 1].focus();
                updateJoinBtn();
            });
            input.addEventListener('paste', e => {
                e.preventDefault();
                const text = e.clipboardData.getData('text').replace(/\D/g, '');
                [...text].slice(0, 6).forEach((ch, j) => {
                    if (digits[j]) { digits[j].value = ch; digits[j].classList.add('filled'); }
                });
                updateJoinBtn();
            });
        });

        function updateJoinBtn() {
            const code = getCode();
            joinBtn.disabled = code.length < 6;
        }

        function getCode() {
            return [...digits].map(d => d.value).join('');
        }

        joinBtn.addEventListener('click', () => {
            const vm = new SessionVM(render);

            function render() {
                const animContainer = document.querySelector('.animation-container');
                if (vm.isLoading) {
                    joinBtn.innerHTML = '<div class="spinner"></div> Connexion...';
                    joinBtn.disabled = true;
                    errorEl.style.display = 'none';
                    if (animContainer) animContainer.classList.add('state-loading');
                } else {
                    joinBtn.innerHTML = 'Rejoindre la session →';
                    joinBtn.disabled = getCode().length < 6;
                    if (animContainer) animContainer.classList.remove('state-loading');

                    if (vm.error) {
                        errorEl.textContent = vm.error;
                        errorEl.style.display = 'block';
                    } else {
                        errorEl.style.display = 'none';
                    }
                }
            }

            vm.setCode(getCode());
            vm.join();
        });

        // Focus first digit on load
        digits[0].focus();
    </script>
</body>

</html>
