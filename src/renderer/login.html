<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Connexion</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            height: 100%;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: #0a0a0f;
            background-image:
                radial-gradient(ellipse 80% 60% at 50% 0%, rgba(88, 101, 242, 0.22) 0%, transparent 70%),
                radial-gradient(ellipse 60% 60% at 80% 100%, rgba(0, 212, 255, 0.10) 0%, transparent 60%),
                radial-gradient(ellipse 50% 50% at 10% 80%, rgba(147, 51, 234, 0.12) 0%, transparent 60%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 24px;
            -webkit-app-region: drag;
        }

        /* ── Orbs ── */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(90px);
            pointer-events: none;
            animation: floatOrb 9s ease-in-out infinite;
        }

        .orb-1 {
            width: 440px;
            height: 440px;
            background: rgba(88, 101, 242, .22);
            top: -130px;
            left: -90px;
        }

        .orb-2 {
            width: 320px;
            height: 320px;
            background: rgba(0, 212, 255, .13);
            bottom: -70px;
            right: 6%;
            animation-delay: -4s;
        }

        .orb-3 {
            width: 220px;
            height: 220px;
            background: rgba(147, 51, 234, .16);
            top: 38%;
            right: 2%;
            animation-delay: -7s;
        }

        @keyframes floatOrb {

            0%,
            100% {
                transform: translateY(0) scale(1);
            }

            50% {
                transform: translateY(-30px) scale(1.05);
            }
        }

        /* ── Brand above card ── */
        .brand {
            position: relative;
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 12px;
            -webkit-app-region: no-drag;
        }

        .brand-logo {
            width: 38px;
            height: 38px;
            background: linear-gradient(135deg, #5865f2, #00d4ff);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            box-shadow: 0 8px 20px rgba(88, 101, 242, .45);
        }

        .brand-name {
            font-size: 17px;
            font-weight: 700;
            color: #fff;
            letter-spacing: -.2px;
        }

        /* ── Card ── */
        .card {
            position: relative;
            z-index: 10;
            -webkit-app-region: no-drag;
            width: 420px;
            background: rgba(30, 31, 35, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.07);
            border-radius: 16px;
            padding: 36px 36px 32px;
            box-shadow:
                0 0 0 1px rgba(88, 101, 242, 0.15) inset,
                0 30px 60px rgba(0, 0, 0, 0.5),
                0 0 80px rgba(88, 101, 242, 0.07);
            animation: fadeUp .4s cubic-bezier(.16, 1, .3, 1) both;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px) scale(.98);
            }

            to {
                opacity: 1;
                transform: none;
            }
        }

        /* Decorative top gradient line on card */
        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 16px;
            right: 16px;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(88, 101, 242, .6), rgba(0, 212, 255, .4), transparent);
            border-radius: 100%;
        }

        /* ── Header ── */
        .card-header {
            text-align: center;
            margin-bottom: 28px;
        }

        .card-header h1 {
            font-size: 22px;
            font-weight: 700;
            color: #f2f3f5;
            letter-spacing: -.3px;
            margin-bottom: 6px;
        }

        .card-header p {
            font-size: 14px;
            color: #72767d;
        }

        /* ── Form ── */
        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: .07em;
            text-transform: uppercase;
            color: #b5bac1;
            margin-bottom: 7px;
        }

        .form-group label .req {
            color: #ed4245;
            margin-left: 2px;
        }

        /* Input */
        .input-wrap {
            position: relative;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            height: 42px;
            padding: 0 40px 0 14px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.09);
            border-radius: 8px;
            color: #dbdee1;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: border-color .2s, background .2s, box-shadow .2s;
        }

        input::placeholder {
            color: #3d3f45;
        }

        input:focus {
            border-color: rgba(88, 101, 242, 0.7);
            background: rgba(88, 101, 242, 0.07);
            box-shadow: 0 0 0 3px rgba(88, 101, 242, 0.15);
        }

        /* Eye toggle */
        .pw-toggle {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #4e5058;
            cursor: pointer;
            font-size: 15px;
            padding: 0;
            line-height: 1;
            transition: color .15s;
        }

        .pw-toggle:hover {
            color: #b5bac1;
        }

        /* Forgot link — below field */
        .forgot-link {
            display: block;
            margin-top: 8px;
            text-align: right;
            font-size: 13px;
            color: #5865f2;
            cursor: pointer;
            font-weight: 500;
            transition: color .15s;
        }

        .forgot-link:hover {
            color: #7289da;
            text-decoration: underline;
        }

        /* Error */
        .error-msg {
            font-size: 13px;
            color: #ed4245;
            background: rgba(237, 66, 69, .08);
            border: 1px solid rgba(237, 66, 69, .2);
            border-radius: 8px;
            padding: 10px 14px;
            margin-bottom: 16px;
            display: none;
            line-height: 1.4;
        }

        /* Submit button */
        .btn-primary {
            width: 100%;
            height: 44px;
            margin-top: 8px;
            background: linear-gradient(135deg, #5865f2, #6b74f3);
            color: #fff;
            font-size: 15px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: filter .15s, transform .1s, box-shadow .15s;
            box-shadow: 0 6px 20px rgba(88, 101, 242, .35);
        }

        .btn-primary:hover {
            filter: brightness(1.1);
            box-shadow: 0 8px 28px rgba(88, 101, 242, .5);
        }

        .btn-primary:active {
            transform: scale(.98);
        }

        .btn-primary:disabled {
            opacity: .45;
            cursor: not-allowed;
            filter: none;
            box-shadow: none;
        }

        /* Spinner */
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, .3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin .7s linear infinite;
        }
    </style>
</head>

<body>

    <!-- Background orbs -->
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>


    <!-- Card -->
    <div class="card">

        <div class="card-header">
            <h1>Connexion</h1>
            <p id="loginSubtitle">Étudiant ou Professeur</p>
        </div>

        <div id="errorMsg" class="error-msg"></div>

        <form id="loginForm" autocomplete="off">

            <!-- Identifiant -->
            <div class="form-group">
                <label for="email" id="labelIdentifiant">IDENTIFIANT</label>
                <div class="input-wrap">
                    <input type="text" id="email" placeholder="Email (prof) ou N° carte (étudiant)" required
                        autocomplete="off" />
                </div>
            </div>

            <!-- Mot de passe -->
            <div class="form-group">
                <label for="password" id="labelPassword">MOT DE PASSE</label>
                <div class="input-wrap">
                    <input type="password" id="password" placeholder="Mot de passe ou CIN" required
                        autocomplete="off" />
                    <button type="button" class="pw-toggle" id="pwToggle">👁</button>
                </div>
            </div>

            <!-- Badge de rôle détecté -->
            <div id="roleBadge" style="
                display:none;
                font-size:12px;
                font-weight:600;
                letter-spacing:.06em;
                text-transform:uppercase;
                padding:6px 12px;
                border-radius:6px;
                margin-bottom:14px;
                text-align:center;
                transition:all .2s;
            "></div>

            <button type="submit" id="submitBtn" class="btn-primary">
                Se connecter
            </button>

        </form>
    </div>

    <script src="./models/User.js"></script>
    <script src="./viewmodels/LoginVM.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const emailEl = document.getElementById('email');
            const passwordEl = document.getElementById('password');
            const submitBtn = document.getElementById('submitBtn');
            const form = document.getElementById('loginForm');
            const errorEl = document.getElementById('errorMsg');
            const pwToggle = document.getElementById('pwToggle');
            const roleBadge = document.getElementById('roleBadge');
            const labelPwd = document.getElementById('labelPassword');
            const subtitle = document.getElementById('loginSubtitle');

            // ── Affichage / masquage mot de passe ──────────────────────
            pwToggle.addEventListener('click', () => {
                const show = passwordEl.type === 'password';
                passwordEl.type = show ? 'text' : 'password';
                pwToggle.textContent = show ? '🙈' : '👁';
            });

            // ── Détection du rôle selon l'identifiant saisi ───────────
            emailEl.addEventListener('input', () => {
                const val = emailEl.value.trim();
                const isProfMode = val.includes('@');

                if (val.length === 0) {
                    // Réinitialiser
                    roleBadge.style.display = 'none';
                    labelPwd.textContent = 'MOT DE PASSE';
                    passwordEl.placeholder = 'Mot de passe ou CIN';
                    subtitle.textContent = 'Étudiant ou Professeur';
                } else if (isProfMode) {
                    // Mode PROFESSEUR
                    roleBadge.style.display = 'block';
                    roleBadge.textContent = '👨‍🏫 Mode Professeur';
                    roleBadge.style.background = 'rgba(88, 101, 242, 0.15)';
                    roleBadge.style.color = '#7289da';
                    roleBadge.style.border = '1px solid rgba(88,101,242,0.3)';
                    labelPwd.textContent = 'MOT DE PASSE';
                    passwordEl.placeholder = 'Entrez votre mot de passe';
                    subtitle.textContent = 'Connexion professeur';
                } else {
                    // Mode ÉTUDIANT
                    roleBadge.style.display = 'block';
                    roleBadge.textContent = '🎓 Mode Étudiant';
                    roleBadge.style.background = 'rgba(0, 212, 255, 0.1)';
                    roleBadge.style.color = '#00d4ff';
                    roleBadge.style.border = '1px solid rgba(0,212,255,0.25)';
                    labelPwd.textContent = 'CIN (mot de passe)';
                    passwordEl.placeholder = 'Entrez votre CIN';
                    subtitle.textContent = 'Connexion étudiant';
                }
            });

            // ── ViewModel ──────────────────────────────────────────────
            const vm = new LoginVM(render);
            emailEl.addEventListener('input', e => vm.setEmail(e.target.value));
            passwordEl.addEventListener('input', e => vm.setPassword(e.target.value));
            form.addEventListener('submit', e => { e.preventDefault(); vm.login(); });

            function render() {
                submitBtn.disabled = vm.isLoading;
                submitBtn.innerHTML = vm.isLoading
                    ? '<div class="spinner"></div> Connexion en cours...'
                    : 'Se connecter';
                errorEl.textContent = vm.errorMessage || '';
                errorEl.style.display = vm.errorMessage ? 'block' : 'none';
            }
        });
    </script>
</body>

</html>
