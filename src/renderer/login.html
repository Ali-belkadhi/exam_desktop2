<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Connexion</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="./assets/css/animation_man_boxes.css" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            height: 100%;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background: linear-gradient(rgba(0, 0, 0, 0.2), rgba(0, 0, 0, 0.2)),
                url('./assets/css/eprit3.jpg') no-repeat center center fixed;
            background-size: cover;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 24px;
            -webkit-app-region: drag;
        }

        /* Glassmorphism Card */
        .card {
            position: relative;
            z-index: 10;
            -webkit-app-region: no-drag;
            width: 440px;
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(32px) saturate(180%);
            -webkit-backdrop-filter: blur(32px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 28px;
            padding: 48px 40px;
            box-shadow:
                0 0 0 1px rgba(255, 255, 255, 0.05) inset,
                0 40px 80px rgba(0, 0, 0, 0.5);
            animation: fadeUp .6s cubic-bezier(.16, 1, .3, 1) both;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(30px) scale(.98);
            }

            to {
                opacity: 1;
                transform: none;
            }
        }

        /* Header */
        .card-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .card-header h1 {
            font-size: 28px;
            font-weight: 800;
            color: #fff;
            letter-spacing: -.5px;
            margin-bottom: 8px;
        }

        .card-header p {
            font-size: 14px;
            color: #72767d;
            display: none;
        }

        /* Form */
        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: .07em;
            text-transform: uppercase;
            color: #b5bac1;
            margin-bottom: 7px;
        }

        .form-group label .req {
            color: #ed4245;
            margin-left: 2px;
        }

        /* Input */
        .input-wrap {
            position: relative;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            height: 48px;
            padding: 0 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #fff;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: all .2s;
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        input:focus {
            border-color: rgba(88, 101, 242, 0.5);
            background: rgba(88, 101, 242, 0.05);
            box-shadow: 0 0 0 4px rgba(88, 101, 242, 0.1);
        }

        /* Eye toggle */
        .pw-toggle {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #4e5058;
            cursor: pointer;
            font-size: 15px;
            padding: 0;
            line-height: 1;
            transition: color .15s;
        }

        .pw-toggle:hover {
            color: #b5bac1;
        }

        /* Forgot link */
        .forgot-link {
            display: block;
            margin-top: 8px;
            text-align: right;
            font-size: 13px;
            color: #5865f2;
            cursor: pointer;
            font-weight: 500;
            transition: color .15s;
        }

        .forgot-link:hover {
            color: #7289da;
            text-decoration: underline;
        }

        /* Error */
        .error-msg {
            font-size: 13px;
            color: #ed4245;
            background: rgba(237, 66, 69, .08);
            border: 1px solid rgba(237, 66, 69, .2);
            border-radius: 8px;
            padding: 10px 14px;
            margin-bottom: 16px;
            display: none;
            line-height: 1.4;
        }

        /* Submit button */
        .btn-primary {
            width: 100%;
            height: 50px;
            margin-top: 12px;
            background: linear-gradient(135deg, #1e1f23, #2f3136);
            color: #fff;
            font-size: 15px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all .2s;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, #2f3136, #36393f);
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.3);
        }

        .btn-primary:active {
            transform: scale(.98);
        }

        .btn-primary:disabled {
            opacity: .45;
            cursor: not-allowed;
            filter: none;
            box-shadow: none;
        }

        /* Spinner */
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, .3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin .7s linear infinite;
        }
    </style>
</head>

<body>
    <!-- Background is now handled via CSS with eprit3.jpg -->

    <!-- Navigation/Logo Bar with Custom Logo -->
    <div style="position: fixed; top: 15px; left: 10px; z-index: 100;">
        <img src="./assets/css/esprit2.png" alt="Logo"
            style="height: 120px; filter: drop-shadow(0 6px 15px rgba(0,0,0,0.4));">
    </div>


    <!-- Card -->
    <div class="card">

        <div class="card-header">
            <!-- Premium Animation -->
            <div class="animation-container" id="loginAnimation">
                <div class="box box-left">
                    <div class="box-fill"></div>
                </div>
                <div class="pulse-line pulse-left"></div>
                <div class="man">
                    <div class="man-head"></div>
                    <div class="man-body"></div>
                </div>
                <div class="pulse-line pulse-right"></div>
                <div class="box box-right">
                    <div class="box-fill"></div>
                </div>
            </div>
            <h1>Login</h1>
            <p id="loginSubtitle"></p>
        </div>

        <div id="errorMsg" class="error-msg"></div>

        <form id="loginForm" autocomplete="off">

            <!-- Identifiant -->
            <div class="form-group">
                <label for="email" id="labelIdentifiant">IDENTIFIANT</label>
                <div class="input-wrap">
                    <input type="text" id="email" placeholder="Email (prof) ou N° carte (étudiant)" required
                        autocomplete="off" />
                </div>
            </div>

            <!-- Mot de passe -->
            <div class="form-group">
                <label for="password" id="labelPassword">MOT DE PASSE</label>
                <div class="input-wrap">
                    <input type="password" id="password" placeholder="Mot de passe ou CIN" required
                        autocomplete="off" />
                    <button type="button" class="pw-toggle" id="pwToggle" aria-label="Afficher le mot de passe">👁</button>
                </div>
            </div>

            <!-- Badge de rôle détecté -->
            <div id="roleBadge" style="
                display:none;
                font-size:12px;
                font-weight:600;
                letter-spacing:.06em;
                text-transform:uppercase;
                padding:6px 12px;
                border-radius:6px;
                margin-bottom:14px;
                text-align:center;
                transition:all .2s;
            "></div>

            <button type="submit" id="submitBtn" class="btn-primary">
                Se connecter
            </button>

        </form>
    </div>

    <script src="./models/User.js"></script>
    <script src="./viewmodels/LoginVM.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const emailEl = document.getElementById('email');
            const passwordEl = document.getElementById('password');
            const submitBtn = document.getElementById('submitBtn');
            const form = document.getElementById('loginForm');
            const errorEl = document.getElementById('errorMsg');
            const pwToggle = document.getElementById('pwToggle');
            const roleBadge = document.getElementById('roleBadge');
            const labelPwd = document.getElementById('labelPassword');
            const subtitle = document.getElementById('loginSubtitle');
            const animContainer = document.getElementById('loginAnimation');
            const eyeOpenIcon = '👁';
            const eyeClosedIcon = '🙈'.replace('🙈', '◉');

            pwToggle.textContent = eyeOpenIcon;

            // Affichage / masquage mot de passe
            pwToggle.addEventListener('click', () => {
                const show = passwordEl.type === 'password';
                passwordEl.type = show ? 'text' : 'password';
                pwToggle.textContent = show ? eyeClosedIcon : eyeOpenIcon;
                pwToggle.setAttribute('aria-label', show ? 'Masquer le mot de passe' : 'Afficher le mot de passe');
            });

            // Détection du rôle selon l'identifiant saisi
            emailEl.addEventListener('input', () => {
                const val = emailEl.value.trim();
                const isProfMode = val.includes('@');

                if (val.length === 0) {
                    // Réinitialiser
                    roleBadge.style.display = 'none';
                    animContainer.classList.remove('state-prof', 'state-student');
                    labelPwd.textContent = 'MOT DE PASSE';
                    passwordEl.placeholder = 'Mot de passe ou CIN';
                    subtitle.textContent = '';
                } else if (isProfMode) {
                    // Mode PROFESSEUR
                    roleBadge.style.display = 'block';
                    animContainer.classList.add('state-prof');
                    animContainer.classList.remove('state-student');
                    roleBadge.textContent = '👨‍🏫 Mode Professeur';
                    roleBadge.style.background = 'rgba(88, 101, 242, 0.15)';
                    roleBadge.style.color = '#7289da';
                    roleBadge.style.border = '1px solid rgba(88,101,242,0.3)';
                    labelPwd.textContent = 'MOT DE PASSE';
                    passwordEl.placeholder = 'Entrez votre mot de passe';
                    subtitle.textContent = '';
                } else {
                    // Mode ÉTUDIANT
                    roleBadge.style.display = 'block';
                    animContainer.classList.add('state-student');
                    animContainer.classList.remove('state-prof');
                    roleBadge.textContent = '🎓 Mode Étudiant';
                    roleBadge.style.background = 'rgba(0, 212, 255, 0.1)';
                    roleBadge.style.color = '#00d4ff';
                    roleBadge.style.border = '1px solid rgba(0,212,255,0.25)';
                    labelPwd.textContent = 'CIN (mot de passe)';
                    passwordEl.placeholder = 'Entrez votre CIN';
                    subtitle.textContent = '';
                }
            });

            // ViewModel
            const vm = new LoginVM(render);
            emailEl.addEventListener('input', e => vm.setEmail(e.target.value));
            passwordEl.addEventListener('input', e => vm.setPassword(e.target.value));
            form.addEventListener('submit', e => { e.preventDefault(); vm.login(); });

            function render() {
                submitBtn.disabled = vm.isLoading;
                submitBtn.innerHTML = vm.isLoading
                    ? '<div class="spinner"></div> Connexion en cours...'
                    : 'Se connecter';

                // Update animation state
                if (vm.isLoading) {
                    animContainer.classList.add('state-loading');
                } else {
                    animContainer.classList.remove('state-loading');
                }

                errorEl.textContent = vm.errorMessage || '';
                errorEl.style.display = vm.errorMessage ? 'block' : 'none';
            }
        });
    </script>
</body>

</html>
